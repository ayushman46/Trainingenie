kind = "web"
previewPath = "/"
title = "TraininGenie"
version = "1.0.0"
id = "artifacts/trainingenie"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25158

[services.development]
run = "pnpm --filter @workspace/trainingenie run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trainingenie", "run", "build" ]
publicDir = "artifacts/trainingenie/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25158"
BASE_PATH = "/"
